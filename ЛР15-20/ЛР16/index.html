<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поймай шарики</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            margin: 0;
            padding: 20px;
            color: white;
        }
        h1 {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        #game {
            width: 400px;
            height: 400px;
            background: #2d3436;
            margin: 20px auto;
            border: 3px solid #636e72;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        #player {
            width: 50px;
            height: 20px;
            background: #00cec9;
            position: absolute;
            bottom: 10px;
            left: 175px;
            border-radius: 10px;
        }
        .ball {
            position: absolute;
            border-radius: 50%;
        }
        #score {
            font-size: 24px;
            margin: 10px;
            font-weight: bold;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            margin: 10px;
            background: #00b894;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        button:hover {
            background: #00a382;
            transform: translateY(-2px);
        }
        .instructions {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 15px auto;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <h1>✨ Поймай шарики ✨</h1>
    <div id="score">Счет: 0</div>
    
    <div class="instructions">
        <p>⬅️ Стрелки: двигать платформу</p>
        <p>⭐ Золотые: +3 очка | 💥 Красные: -2 жизни</p>
    </div>
    
    <div id="game">
        <div id="player"></div>
    </div>
    
    <button onclick="game.start()">Старт</button>
    <button onclick="game.stop()">Стоп</button>
    
    <script src="script.js"></script>
</body>
</html>
